<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../CSS/style.css">
  <title>Mercado Pro Clubs - Entrar / Cadastrar</title>
</head>
<body class="pagina-cadastro">

  <!-- HEADER SIMPLES SEM MENU -->
  <header class="cad-header">
    <a href="../index.html" title="Voltar para a página inicial">
      <img src="../IMG/logo maior.svg" class="cad-logo" alt="Pro Clubs Hub Brasil Logo" />
    </a>
  </header>

  <!-- LAYOUT DIVIDIDO: esquerda = arte | direita = formulário -->
  <main class="cad-main">

    <!-- LADO DIREITO — formulário -->
    <div class="cad-lado-direito">
      <div class="cad-card">

        <!-- ABAS: Cadastro / Login -->
        <div class="cad-tabs">
          <button class="cad-tab active" id="tabCadastro">Criar conta</button>
          <button class="cad-tab" id="tabLogin">Já tenho conta</button>
        </div>

        <!-- FORMULÁRIO DE CADASTRO -->
        <form id="form-cadastro" class="cad-form active">
          <div class="cad-field">
            <label for="nome">Nome / Usuário</label>
            <input type="text" id="nome" placeholder="Ex: CraqueNeymar10" required />
          </div>
          <div class="cad-field">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="exemplo@email.com" required />
          </div>
          <div class="cad-field">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required minlength="6" />
          </div>
          <div class="cad-field">
            <label for="senha1">Repetir senha</label>
            <input type="password" id="senha1" placeholder="Repita a senha" required oninput="validarSenha(this)" />
          </div>
          <button type="submit" class="cad-btn-primary">Criar minha conta</button>
        </form>

        <!-- FORMULÁRIO DE LOGIN -->
        <form id="form-login" class="cad-form">
          <div class="cad-field">
            <label for="login-email">E-mail</label>
            <input type="email" id="login-email" placeholder="exemplo@email.com" required />
          </div>
          <div class="cad-field">
            <label for="login-senha">Senha</label>
            <input type="password" id="login-senha" placeholder="Sua senha" required />
          </div>
          <button type="submit" class="cad-btn-primary">Entrar</button>
        </form>

        <!-- DIVISOR -->
        <div class="cad-divisor">
          <span>ou continue com</span>
        </div>

        <!-- BOTÃO GOOGLE -->
        <button type="button" class="cad-btn-google" id="btn-google">
          <img src="../IMG/pesquisa.png" class="cad-google-icon" alt="Google" />
          Entrar com o Google
        </button>

      </div>
    </div>

  </main>
  <script type="module" src="../js/auth.js"></script>
  <script type="module" src="../js/cadastro-tabs.js"></script>
</body>
</html>
