<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Crie seu perfil gratuito no Mercado Pro Clubs e entre para o maior mercado de transferências de Pro Clubs do Brasil.">
  <meta name="robots" content="noindex, follow">
  <link rel="stylesheet" href="../CSS/style.css">
  <link rel="icon" href="../IMG/favicon.svg" type="image/svg+xml">
  <title>Mercado Pro Clubs - Entrar / Cadastrar</title>
</head>
<body class="pagina-cadastro">

  <!-- HEADER SIMPLES SEM MENU -->
  <header class="cad-header">
    <a href="../index.html" title="Voltar para a página inicial">
      <img src="../IMG/logo.svg" class="cad-logo" alt="Pro Clubs Hub Brasil Logo" />
    </a>
  </header>

  <!-- LAYOUT DIVIDIDO: esquerda = arte | direita = formulário -->
  <main class="cad-main">

    <!-- LADO DIREITO — formulário -->
    <div class="cad-lado-direito">
      <div class="cad-card">

        <h1 class="sr-only">Criar conta ou entrar no Mercado Pro Clubs</h1>

        <!-- ABAS: Cadastro / Login -->
        <div class="cad-tabs" role="tablist">
          <button type="button" class="cad-tab active" id="tabCadastro" role="tab" aria-selected="true" aria-controls="form-cadastro">Criar conta</button>
          <button type="button" class="cad-tab" id="tabLogin" role="tab" aria-selected="false" aria-controls="form-login" tabindex="-1">Já tenho conta</button>
        </div>

        <!-- FORMULÁRIO DE CADASTRO -->
        <form id="form-cadastro" class="cad-form active" role="tabpanel" aria-labelledby="tabCadastro">
          <div class="cad-field">
            <label for="nome">Nome / Usuário</label>
            <input type="text" id="nome" name="nome" autocomplete="username" placeholder="Ex: CraqueNeymar10" maxlength="40" required />
          </div>
          <div class="cad-field">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" autocomplete="email" autocapitalize="none" placeholder="exemplo@email.com" required />
          </div>
          <div class="cad-field">
            <label for="senha">Senha</label>
            <div class="cad-senha-wrap">
              <input type="password" id="senha" name="senha" autocomplete="new-password" placeholder="Mínimo 10 caracteres" required minlength="10" />
              <button type="button" class="cad-mostrar-senha" data-alvo="senha" aria-label="Mostrar senha">Mostrar</button>
            </div>
            <p id="forca-senha" class="cad-senha-dica">Use 10 ou mais caracteres, com maiúscula, minúscula, número e símbolo.</p>
          </div>
          <div class="cad-field">
            <label for="senha1">Repetir senha</label>
            <div class="cad-senha-wrap">
              <input type="password" id="senha1" name="senha1" autocomplete="new-password" placeholder="Repita a senha" required minlength="10" />
              <button type="button" class="cad-mostrar-senha" data-alvo="senha1" aria-label="Mostrar confirmação da senha">Mostrar</button>
            </div>
          </div>
          <button type="submit" class="cad-btn-primary">Criar minha conta</button>
          <p id="cadastro-feedback" class="cad-feedback" role="status" aria-live="polite"></p>
        </form>

        <!-- FORMULÁRIO DE LOGIN -->
        <form id="form-login" class="cad-form" role="tabpanel" aria-labelledby="tabLogin" hidden>
          <div class="cad-field">
            <label for="login-email">E-mail</label>
            <input type="email" id="login-email" name="login-email" autocomplete="email" autocapitalize="none" placeholder="exemplo@email.com" required />
          </div>
          <div class="cad-field">
            <label for="login-senha">Senha</label>
            <div class="cad-senha-wrap">
              <input type="password" id="login-senha" name="login-senha" autocomplete="current-password" placeholder="Sua senha" required />
              <button type="button" class="cad-mostrar-senha" data-alvo="login-senha" aria-label="Mostrar senha">Mostrar</button>
            </div>
          </div>
          <button type="submit" class="cad-btn-primary">Entrar</button>
          <button type="button" id="btn-esqueci-senha" class="cad-link-button">Esqueci minha senha</button>
          <p id="login-feedback" class="cad-feedback" role="status" aria-live="polite"></p>
        </form>

        <!-- DIVISOR -->
        <div class="cad-divisor">
          <span>ou continue com</span>
        </div>

        <!-- BOTÃO GOOGLE -->
        <button type="button" class="cad-btn-google" id="btn-google">
          <img src="../IMG/pesquisa.png" class="cad-google-icon" alt="" />
          Entrar com o Google
        </button>
        <p id="google-feedback" class="cad-feedback" role="status" aria-live="polite"></p>
        <p class="cad-seguranca">🔒 Sua senha é processada com segurança pelo Firebase e não é armazenada neste site.</p>

      </div>
    </div>

  </main>
  <script type="module" src="../JS/auth.js"></script>
  <script type="module" src="../JS/cadastro.js"></script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
