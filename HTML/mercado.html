<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../CSS/style.css" />
    <title>procure o seu time - mercado pro clubs</title>
  </head>
  <body>
    <header class="main-header">
      <a class="logo" href="../index.html" title="voltar para a página inicial">
        <img
          src="../IMG/logo maior.svg"
          class="logo"
          alt="Pro Clubs Hub Brasil Logo"
        />
      </a>
      <div class="menu-carrossel">
        <nav>
          <ul class="lista-links">
            <li><a href="../HTML/meu-perfil.html">meu perfil</a></li>
            <li><a href="../HTML/mercado.html">mercado</a></li>
            <li><a href="../HTML/torneio.html">torneio</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <main>
      <section class="lfg-section">
        <div class="lfg-container">
          <div class="lfg-header">
            <h2>Mercado de Transferências</h2>
            <p>Encontre o seu esquadrão ou recrute para o seu clube.</p>

            <div class="lfg-filtros">
              <select id="filtro-plataforma" class="lfg-select">
                <option value="todas">Todas as Plataformas</option>
                <option value="switch2">nintendo switch 2</option>
                <option value="switch">nintendo switch</option>
                <option value="xboxS">Xbox Series X/S</option>
                <option value="xboxO">Xbox one</option>
                <option value="ps5">PlayStation 5</option>
                <option value="ps4">PlayStation 4</option>
                <option value="pc">PC</option>
              </select>
              <select id="filtro-posicao" class="lfg-select">
                <option value="todas">Todas as Posições</option>
                <option value="ata">Ataque (ATA)</option>
                <option value="mei">Meio-Campo (MEI/VOL)</option>
                <option value="zag">Defesa (ZAG/LAT)</option>
                <option value="gk">Goleiro (GK)</option>
              </select>
              <select id="filtro-jogo" class="lfg-select">
                <option value="todas">Todas os jogos</option>
                <option value="eafc26">EAFC26</option>
                <option value="eafc25">EAFC25</option>
                <option value="eafc24">EAFC24</option>
                <option value="eafc23">EAFC23</option>
              </select>
            </div>
            <h1 class="titulo-time">encontre seu clube</h1>
            <div class="lfg-criador">
              <h3>Anunciar Vaga no Seu Clube</h3>
              <form id="form-lfg" class="form-lfg">
                <div class="form-linha">
                  <input
                    type="text"
                    id="post-clube"
                    class="lfg-input"
                    placeholder="Nome do Clube"
                    required
                  />
                  <select id="post-plataforma" required class="lfg-input">
                    <option value="" disabled selected>
                      Plataforma do Clube
                    </option>
                    <option value="switch2">nintendo switch 2</option>
                    <option value="switch">nintendo switch</option>
                    <option value="xboxS">Xbox Series X/S</option>
                    <option value="xboxO">Xbox one</option>
                    <option value="ps5">PlayStation 5</option>
                    <option value="ps4">PlayStation 4</option>
                    <option value="pc">PC</option>
                  </select>
                </div>
                <div class="form-linha">
                  <select id="post-posicao" required class="lfg-input">
                    <option value="" disabled selected>
                      Posição Necessária
                    </option>
                    <option value="tds">Todas as Posições</option>
                    <option value="ata">Precisamos de ATA</option>
                    <option value="mei">Precisamos de MEI</option>
                    <option value="vol">Precisamos de VOL</option>
                    <option value="zag">Precisamos de ZAG/LAT</option>
                    <option value="gk">Precisamos de GK</option>
                  </select>
                  <select id="post-estilo" required class="lfg-input">
                    <option value="" disabled selected>Estilo do Time</option>
                    <option value="casual">Casual (Por diversão)</option>
                    <option value="competitivo">
                      Competitivo (Ligas/Campeonatos)
                    </option>
                  </select>
                </div>
                <div class="form-linha">
                  <select id="post-jogo" required class="lfg-input">
                    <option value="" disabled selected>Versão do Jogo</option>
                    <option value="eafc26">EA FC 26</option>
                    <option value="eafc25">EA FC 25</option>
                    <option value="eafc24">EA FC 24</option>
                    <option value="eafc23">EA FC 23</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="../JS/times.js"></script>
    <script type="module" src="../JS/header-auth.js"></script>
  </body>
</html>
