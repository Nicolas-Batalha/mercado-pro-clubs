<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Procure jogadores e clubes de Pro Clubs por posição, plataforma e versão do jogo (EAFC23 a 26). Encontre seu próximo time ou reforço para o elenco.">
    <link rel="stylesheet" href="../CSS/style.css" />
    <link rel="icon" href="./IMG/favicon.svg" type="image/svg+xml">
    <title>Mercado de Jogadores - Vagas Abertas em Clubes de Pro Clubs</title>
    <meta name="description" content="Veja vagas abertas em clubes de Pro Clubs, filtre por posição e plataforma, e candidate-se direto pela plataforma.">
    <style>
      /* Estilos mínimos para busca e upload — mover para style.css quando possível */
      .lfg-busca { margin: 12px 0; }
      .lfg-busca .lfg-input { width: 100%; }
      .lfg-label-upload {
        display: flex; align-items: center; gap: 10px; cursor: pointer;
        border: 1px dashed #12E06C; border-radius: 8px; padding: 10px 14px;
        color: #A0AAB5; font-size: 0.85rem; flex: 1;
      }
      .lfg-label-upload:hover { border-color: #fff; color: #fff; }
      .lfg-input-file { display: none; }
      .lfg-foto-preview {
        max-width: 160px; max-height: 160px; border-radius: 8px; object-fit: contain;
        border: 1px solid #12E06C; background: #0d0d0d;
      }
      .lfg-foto-preview.hidden { display: none; }
      .card-imagem {
        width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 12px;
        background: #0d0d0d; display: flex; justify-content: center; align-items: center;
      }
      .card-imagem img {
        width: 100%; height: auto; max-height: 420px; object-fit: contain;
        display: block; margin: 0 auto;
      }
      .card-imagem img { cursor: zoom-in; }
      .lightbox-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.9);
        display: flex; align-items: center; justify-content: center;
        z-index: 10000; cursor: zoom-out; padding: 20px;
      }
      .lightbox-overlay.hidden { display: none; }
      .lightbox-overlay img {
        max-width: 90vw; max-height: 90vh; object-fit: contain;
        border-radius: 8px; box-shadow: 0 0 40px rgba(18,224,108,0.25);
      }
      .lightbox-fechar {
        position: absolute; top: 18px; right: 24px; color: #fff; font-size: 2rem;
        cursor: pointer; line-height: 1; user-select: none;
      }
      /* Galeria de miniaturas (até 3 fotos) */
      .lfg-galeria-preview { display: flex; gap: 8px; flex-wrap: wrap; }
      .card-galeria { display: flex; gap: 6px; margin-top: 8px; }
      .card-galeria img {
        width: 64px; height: 64px; object-fit: cover; border-radius: 6px;
        cursor: zoom-in; border: 1px solid #333;
      }
      /* Badges extras */
      .badge-verificado {
        background: #0d2a1a; color: #12E06C; border: 1px solid #12E06C;
        font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px;
        margin-left: 6px;
      }
      .badge-nivel-min {
        background: #1a1a0d; color: #e0c012; border: 1px solid #e0c012;
        font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px;
      }
      /* Botões de ação extras no card */
      .btn-acao-card {
        padding: 6px 12px; border-radius: 8px; font-weight: bold; cursor: pointer;
        font-size: 0.75rem; border: 1px solid #444; background: transparent; color: #A0AAB5;
      }
      .btn-acao-card:hover { border-color: #12E06C; color: #12E06C; }
      .btn-editar-vaga:hover { border-color: #2196f3; color: #2196f3; }
      .btn-denunciar-vaga:hover { border-color: #d32f2f; color: #d32f2f; }
      /* Destaque quando a vaga é aberta via link compartilhado */
      .lfg-card.destaque-compartilhada {
        outline: 2px solid #12E06C; outline-offset: 2px;
        animation: pulso-destaque 1.6s ease-in-out 2;
      }
      @keyframes pulso-destaque {
        0%,100% { box-shadow: 0 0 0 rgba(18,224,108,0); }
        50% { box-shadow: 0 0 18px rgba(18,224,108,0.6); }
      }
      .btn-carregar-mais {
        display: block; margin: 20px auto 0; padding: 10px 26px; border-radius: 8px;
        border: 1px solid #12E06C; background: transparent; color: #12E06C;
        font-weight: bold; cursor: pointer;
      }
      .btn-carregar-mais:hover { background: #12E06C; color: #050B14; }
      .lfg-checkbox-nivel { display: flex; align-items: center; gap: 8px; margin: 10px 0; color: #A0AAB5; font-size: 0.85rem; }
      #btn-cancelar-edicao { display: none; }
    </style>
  </head>
  <body>
    <header class="main-header">
      <div class="logo animar-scroll">
        <a href="../index.html" title="voltar para a página inicial">
          <img src="../IMG/logo.svg" class="logo" alt="Pro Clubs Hub Brasil Logo" />
        </a>
      </div>
      <div class="menu-carrossel">
        <nav>
          <ul class="lista-links animar-scroll">
            <li><a href="./meu-perfil.html">meu perfil</a></li>
          </ul>
        </nav>
      </div>
      <div class="login-header animar-scroll">
        <!-- Sino de notificações -->
        <div class="notification-icon" id="sino-btn" style="position:relative;cursor:pointer">
          <span class="bell-icon">🔔</span>
          <span id="badge" class="notification-badge hidden">0</span>
        </div>
        <!-- Ícone de mensagens → vai para o chat mais recente -->
        <div class="email-container" id="emailIcon">
          <svg viewBox="0 0 24 24" class="email-icon">
            <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" />
          </svg>
        </div>
        <!-- Avatar / botões de login injetados pelo header-auth.js -->
        <div id="login-header"></div>
      </div>
    </header>

    <main class="main-main">
      <section class="lfg-section">
        <div class="lfg-container">
          <div class="lfg-header">
            <h2>Mercado de Transferências</h2>
            <p>Encontre o seu esquadrão ou recrute para o seu clube.</p>
            <span class="bastao"></span>
            <h2 class="filtragem">Filtrar vagas</h2>
            <!-- BUSCA POR TEXTO -->
            <div class="lfg-busca">
              <input type="text" id="busca-texto" class="lfg-input" placeholder="🔎 Buscar por nome do clube ou descrição..." />
            </div>
            <!-- FILTROS -->
            <div class="lfg-filtros">
              <select id="filtro-plataforma" class="lfg-select">
                <option value="todas">Todas as Plataformas</option>
                <option value="switch2">Nintendo Switch 2</option>
                <option value="switch">Nintendo Switch</option>
                <option value="xboxS">Xbox Series X/S</option>
                <option value="xboxO">Xbox One</option>
                <option value="ps5">PlayStation 5</option>
                <option value="ps4">PlayStation 4</option>
                <option value="pc">PC</option>
              </select>
              <select id="filtro-posicao" class="lfg-select">
                <option value="todas">Todas as Posições</option>
                <option value="ata">Ataque (ATA)</option>
                <option value="mei">Meio-Campo (MEI/VOL)</option>
                <option value="zag">Defesa (ZAG/LAT)</option>
                <option value="gk">Goleiro (GK)</option>
              </select>
              <select id="filtro-jogo" class="lfg-select">
                <option value="todas">Todos os jogos</option>
                <option value="eafc26">EAFC26</option>
                <option value="eafc25">EAFC25</option>
                <option value="eafc24">EAFC24</option>
                <option value="eafc23">EAFC23</option>
              </select>
              <select id="ordenar-vagas" class="lfg-select">
                <option value="recentes">Mais recentes</option>
                <option value="antigas">Mais antigas</option>
                <option value="az">Clube (A-Z)</option>
              </select>
            </div>

            <h1 class="titulo-time">encontre seu clube</h1>

            <!-- FORMULÁRIO DE PUBLICAR VAGA -->
            <div class="lfg-criador">
              <h3>Anunciar Vaga no Seu Clube</h3>
              <form id="form-lfg" class="form-lfg">
                <div class="form-linha">
                  <input type="text" id="post-clube" class="lfg-input" placeholder="Nome do Clube" required />
                  <select id="post-plataforma" required class="lfg-input">
                    <option value="" disabled selected>Plataforma do Clube</option>
                    <option value="switch2">Nintendo Switch 2</option>
                    <option value="switch">Nintendo Switch</option>
                    <option value="xbox-Series">Xbox Series X/S</option>
                    <option value="xbox-One">Xbox One</option>
                    <option value="ps5">PlayStation 5</option>
                    <option value="ps4">PlayStation 4</option>
                    <option value="pc">PC</option>
                  </select>
                </div>
                <div class="form-linha">
                  <label for="post-foto" class="lfg-label-upload">
                    <span id="post-foto-texto">📷 Adicionar até 3 imagens do anúncio (opcional, 2MB cada)</span>
                    <input type="file" id="post-foto" accept="image/*" class="lfg-input-file" multiple />
                  </label>
                </div>
                <div class="form-linha lfg-galeria-preview" id="post-foto-preview-wrap"></div>
                <div class="form-linha">
                  <select id="post-posicao" required class="lfg-input">
                    <option value="" disabled selected>Posição Necessária</option>
                    <option value="psd">Todas as posições</option>
                    <option value="ata">Precisamos de ATA</option>
                    <option value="mei">Precisamos de MEI</option>
                    <option value="vol">Precisamos de VOL</option>
                    <option value="zag">Precisamos de ZAG/LAT</option>
                    <option value="gk">Precisamos de GK</option>
                  </select>
                  <select id="post-estilo" required class="lfg-input">
                    <option value="" disabled selected>Estilo do Time</option>
                    <option value="casual">Casual (Por diversão)</option>
                    <option value="competitivo">Competitivo (Ligas/Campeonatos)</option>
                  </select>
                </div>
                <div class="form-linha">
                  <select id="post-jogo" required class="lfg-input">
                    <option value="" disabled selected>Versão do Jogo</option>
                    <option value="eafc26">EA FC 26</option>
                    <option value="eafc25">EA FC 25</option>
                    <option value="eafc24">EA FC 24</option>
                    <option value="eafc23">EA FC 23</option>
                  </select>
                  <input type="number" id="post-overall-min" class="lfg-input" min="1" max="99"
                    placeholder="Overall mínimo exigido (opcional)" />
                </div>
                <textarea id="post-descricao" class="lfg-textarea" rows="3"
                  placeholder="Ex: Nosso clube está na Divisão 2. Precisamos de um volante pegador. Jogamos todos os dias às 21h."
                  ></textarea>
                <button type="submit" id="btn-publicar" class="btn-publicar">Publicar Vaga</button>
                <button type="button" id="btn-cancelar-edicao" class="btn-acao-card">Cancelar edição</button>
              </form>
            </div>

            <!-- FILTRO: só vagas dentro do meu overall -->
            <label class="lfg-checkbox-nivel">
              <input type="checkbox" id="filtro-meu-nivel" />
              Mostrar só vagas dentro do meu overall (precisa estar logado e ter overall no perfil)
            </label>

            <!-- FEED DE VAGAS -->
            <h3 class="titulo-time">vagas publicadas</h3>
            <div class="lfg-feed" id="lfg-feed">
              <!-- cards injetados via JS -->
            </div>
            <button type="button" id="btn-carregar-mais" class="btn-carregar-mais hidden">Carregar mais vagas</button>
          </div>
        </div>
      </section>
    </main>

    <!-- LIGHTBOX: mostra a imagem do anúncio ampliada ao clicar -->
    <div id="lightbox-overlay" class="lightbox-overlay hidden">
      <span class="lightbox-fechar">&times;</span>
      <img id="lightbox-img" src="" alt="Imagem ampliada do anúncio" />
    </div>

    <script src="../JS/script.js" defer></script>
    <script type="module" src="../JS/times.js"></script>
    <script type="module" src="../JS/header-auth.js"></script>
  </body>
</html>
